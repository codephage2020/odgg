services:
  # TPC-H sample database
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: tpch
      POSTGRES_USER: odgg
      POSTGRES_PASSWORD: odgg_dev
    ports:
      - "5435:5432"
    volumes:
      - ./docker/tpc-h/init.sql:/docker-entrypoint-initdb.d/init.sql
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U odgg -d tpch"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    environment:
      ODGG_DEBUG: "true"
      ODGG_LLM_PROVIDER: "openai"
      ODGG_LLM_MODEL: "gpt-4o"
      ODGG_LLM_API_KEY: "${ODGG_LLM_API_KEY:-}"
      ODGG_CORS_ORIGINS: '["http://localhost:3001"]'
    depends_on:
      db:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3001:3001"
    environment:
      VITE_API_URL: "http://localhost:8001/api/v1"
    depends_on:
      - backend

volumes:
  pgdata:
